set $APP_NAME turbolab.it;

## 🌎 public webroot ("htdocs")
root $PROJECT_DIR/public;

## 🔢 PHP version to use
set $PHP_VER 8.5;

## 🧰 Maintenace - To activate:
# https://github.com/TurboLabIt/webstackup/blob/master/my-app-template/scripts/maintenance.sh
include /usr/local/turbolab.it/webstackup/config/nginx/06_maintenace.conf;

## 🛣 Redirect map
if ($wsuRedirectToMapTurbolabit) {
  return 301 $wsuRedirectToMapTurbolabit;
}

## 103 Early Hints
add_header Link "<https://code.jquery.com>; rel=preconnect;" always;


## 👮🏻 Extra-security (requires a valid HTTPS certificate)
## https://github.com/TurboLabIt/webstackup/blob/master/config/nginx/70_security.conf
include /usr/local/turbolab.it/webstackup/config/nginx/70_security.conf;

## 💬 phpBB (forum)
## https://github.com/TurboLabIt/webstackup/blob/master/config/nginx/10_phpbb_forum_location.conf
include /usr/local/turbolab.it/webstackup/config/nginx/10_phpbb_forum_location.conf;

## Non-Symfony pages
rewrite ^/ajax/login/$ /special-pages/login.php last;
rewrite ^/ajax/logout/$ /special-pages/logout.php last;
rewrite ^/ajax/commenti/([1-9]+[0-9]*)$ /special-pages/comments.php?id=$1 last;
rewrite ^/comments-topic-update/$ /special-pages/comments-topic-update.php last;
rewrite ^/comments-topic-delete/$ /special-pages/comments-topic-delete.php last;
rewrite ^/issue-add-to-post/$ /special-pages/issues.php last;
location ^~ /special-pages/ {

  # /special-pages/ must be reachable ONLY through the designated rewrites above,
  # NEVER by their direct `/special-pages/<file>.php` filename. `internal` does two things at once:
  #   1. hides the include-only helpers under includes/ (00_begin.php, 10_phpbb_start.php, phpBBCookies.php),
  #      which have no THIS_SPECIAL_PAGE_PATH guard and, if hit directly, execute far enough to 500
  #   2. stops the real entry pages from being driven by a bypass filename (the app-level THIS_SPECIAL_PAGE_PATH
  #      check in 00_begin.php stays as defense-in-depth, but PHP now never runs on a direct hit at all).
  internal;

  try_files  $uri =404;
  include fastcgi_params;
  fastcgi_intercept_errors on;
  fastcgi_pass unix:/run/php/php$PHP_VER-fpm.sock;
  fastcgi_param  SCRIPT_FILENAME  $request_filename;

  # the REAL TCP peer. Unlike REMOTE_ADDR (which the real_ip module rewrites from a
  # client-supplied X-Forwarded-For), $realip_remote_addr is the raw socket peer and can't be header-spoofed.
  fastcgi_param  TLI_REAL_REMOTE_ADDR  $realip_remote_addr;
}

## X-Sendfile
# https://www.nginx.com/resources/wiki/start/topics/examples/x-accel/
# https://www.nginx.com/resources/wiki/start/topics/examples/xsendfile/
location ^~ /xsend-uploaded-assets {
    internal;
    alias $PROJECT_DIR/var/uploaded-assets;
    expires 365d;

    # re-declare the site-wide security headers on the download response.
    # nginx inherits server-level `add_header`s into a location ONLY IF that location declares none of its
    # own. The `x-tli-xsent` marker below is such a declaration, so without this it silently strips
    # nosniff/HSTS/CSP/etc. from EVERY file download
    add_header X-Content-Type-Options            "nosniff"                                        always;
    add_header X-Frame-Options                   "SAMEORIGIN"                                     always;
    add_header Content-Security-Policy           "frame-ancestors 'self'"                         always;
    add_header X-Permitted-Cross-Domain-Policies "none"                                           always;
    add_header Referrer-Policy                   "strict-origin-when-cross-origin"                always;
    add_header Strict-Transport-Security         "max-age=63072000; includeSubDomains; preload"  always;
    add_header x-tli-xsent true;

    # 🔒 belt-and-suspenders — uploads are untrusted, arbitrary-type content.
    # This block has no fastcgi_pass and, being ^~, already shadows the server-level PHP handler, so an
    # uploaded file is delivered as inert bytes rather than executed. As a last line of defence, hard-deny
    # the only extensions this stack can actually EXECUTE — the ones PHP-FPM runs — so that even if a future
    # refactor exposed this path or finding #1 regressed, a dropped .php/.phar can never run.
    location ~* \.(?:php[0-9]*|phar|phtml|pht)$ {
        # `return 403` (not `deny all`): unconditional, so it is NOT subvertible by the basic-auth gate
        # active on dev/staging (`satisfy any` would otherwise turn `deny all` into a 401 auth challenge).
        return 403;
    }
}

## 📐 Symfony
include /usr/local/turbolab.it/webstackup/config/nginx/07_symfony_location.conf;

##
location ^~ /immagini/ {
  allow all;
  expires 365d;
  rewrite ^/immagini/([a-z]+)/([1-9]+[0-9]*)/([^/]+-)([1-9]+[0-9]*\.[^/]+)$ /immagini/$1/$2/$4 break;
  try_files $uri /index.php$is_args$args;
}

## 🫴🏻 Shared Nginx config
# https://github.com/TurboLabIt/webstackup/blob/master/config/nginx/common-bundle.conf
include /usr/local/turbolab.it/webstackup/config/nginx/common-bundle.conf;

## 🧹 Clean the root
rewrite ^/favicon\.ico$ /images/logo/2013/favicon.ico last;
rewrite ^/apple-touch-icon\.png$ /images/logo/2013/ttt-192px-tiny.png last;
rewrite ^/images/logo/icon\.png$ /images/logo/2013/ttt-192px-tiny.png last;
rewrite ^/robots\.txt$ /misc/robots.txt last;
rewrite ^/open-?search\.xml$ /misc/open-search.xml last;

## ads.txt is now managed by clickio
#rewrite ^/ads\.txt$ /misc/ads.txt last;
location = /ads.txt {
  return 302 https://adstxt.clickio.com/turbolab.it/ads.txt;
}


location /sitemap/ {
  alias $PROJECT_DIR/var/sitemaps/;
  ## 🐡 Disable serving unrequested .gz files automatically
  # the correct URL (.xml or .xml.gz) must be used explicitely
  # https://nginx.org/en/docs/http/ngx_http_gzip_static_module.html
  gzip_static off;
}

## 🏃‍♂️ Async runner (requires a related cron job)
#include /usr/local/turbolab.it/webstackup/config/nginx/45_async-runner-request.conf;

## 📃 Logging
error_log /var/log/nginx/turbolab.it_error.log;
access_log /var/log/nginx/turbolab.it_access.log;
