# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        cookie_lifetime: 7776000
        ## symfony sometime error ps_files_cleanup_dir
        # https://symfony.com/doc/current/components/http_foundation/session_configuration.html#configuring-garbage-collection
        gc_probability: null

    php_errors:
        log: true

    # bot/crawler hits on AJAX-only endpoints are expected, not bugs.
    # Log at info so prod's fingers_crossed handler (action_level: error) never flushes it to prod.log.
    exceptions:
        App\Exception\AjaxOnlyException:
            log_level: 'info'

    disallow_search_engine_index: false

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
